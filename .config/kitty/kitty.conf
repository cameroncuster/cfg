# ╔══════════════════════════════════════════════════════════════╗
# ║  KITTY CONFIG — "PHANTOM PROTOCOL"                           ║
# ║  A hacker aesthetic for those who live in the terminal.      ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── FONT ────────────────────────────────────────────────────
font_family      JetBrains Mono
font_size        13.0
adjust_line_height 5

# ─── CURSOR ──────────────────────────────────────────────────
cursor                 #00ff41
cursor_text_color      #0a0a0a

# ─── MOUSE ───────────────────────────────────────────────────
copy_on_select  clipboard
strip_trailing_spaces smart

# ─── WINDOW ──────────────────────────────────────────────────
hide_window_decorations titlebar-only
background_opacity 0.88
inactive_text_alpha 0.7
confirm_os_window_close 0

# ─── COLOR PALETTE — "PHANTOM GREEN" ────────────────────────
foreground #00ff41
background #0a0a0a

selection_foreground #0a0a0a
selection_background #00ff41

color0  #0a0a0a
color1  #ff0033
color2  #00ff41
color3  #ffb800
color4  #00bfff
color5  #bf00ff
color6  #00ffcc
color7  #b0b0b0

color8  #1a1a1a
color9  #ff3366
color10 #39ff14
color11 #ffdd33
color12 #33ccff
color13 #d94dff
color14 #33ffd6
color15 #e0e0e0

active_tab_foreground   #0a0a0a
active_tab_background   #00ff41
inactive_tab_foreground #00ff41
inactive_tab_background #1a1a1a
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_background      #0a0a0a

# ─── MACOS ───────────────────────────────────────────────────
macos_option_as_alt yes

# ─── KEYBINDS ────────────────────────────────────────────────
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window bottom
map ctrl+shift+k neighboring_window top
map ctrl+shift+l neighboring_window right

map ctrl+shift+u scroll_page_up
map ctrl+shift+d scroll_page_down
map ctrl+shift+g scroll_home
map ctrl+shift+e scroll_end

map ctrl+shift+n scroll_to_prompt 1
map ctrl+shift+p scroll_to_prompt -1

map ctrl+shift+v launch --location=vsplit --cwd=current
map ctrl+shift+s launch --location=hsplit --cwd=current
map ctrl+shift+w close_window
map ctrl+shift+z toggle_layout stack
map ctrl+shift+equal resize_window reset

map ctrl+shift+left  resize_window narrower 2
map ctrl+shift+right resize_window wider 2
map ctrl+shift+up    resize_window taller 2
map ctrl+shift+down  resize_window shorter 2

map cmd+t new_tab_with_cwd
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab

# ─── LAYOUT ──────────────────────────────────────────────────
enabled_layouts splits,stack

# ─── PERFORMANCE ─────────────────────────────────────────────
repaint_delay 6
input_delay 1
sync_to_monitor yes

