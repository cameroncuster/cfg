# ─── DARK — "E-INK DARK" ────────────────────────────────────────────
# eink's night mode: warm paper-white ink on near-black, pure grayscale
# with brightness doing the work color normally does. the ramp is spread
# wide so syntax reads as ink weight: keywords near-white, functions and
# types light, plain text mid, strings quiet, comments faint
# pairs with the kitty nvim colorscheme (mirrors this palette)

cursor                 #e8e5e0
cursor_text_color      #141414

foreground #b0ada8
background #141414

