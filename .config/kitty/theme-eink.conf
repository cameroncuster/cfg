# ─── LIGHT — "E-INK" ────────────────────────────────────────────────
# pure grayscale: charcoal ink on warm paper gray, reads like a kindle.
# the ramp is spread wide so syntax reads as ink weight (inverse of
# einkdark): keywords near-black, functions and types dark, plain text
# mid, strings quiet, comments faint
# pairs with the kitty nvim colorscheme (mirrors this palette)

