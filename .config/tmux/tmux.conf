# Prefix: Ctrl+Space (more ergonomic than default Ctrl+b)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Enable mouse support
set -g mouse on

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Seamless vim/tmux pane navigation (vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Vim-style copy mode bindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Split panes using | and - (more intuitive)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Session navigation
bind g display-popup -E -w 60% -h 60% "tmux list-sessions -F '#S' | grep -vx \"$(tmux display-message -p '#S')\" | fzf --reverse --prompt='switch> ' | xargs -r tmux switch-client -t"
bind S command-prompt -p "new session:" "new-session -d -s '%%' \\; switch-client -t '%%'"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Terminal capabilities (kitty + tmux interop)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:RGB"
set -g allow-passthrough on
set -g set-clipboard on

# Increase scrollback buffer size
set -g history-limit 100000

# Don't rename windows automatically
set-option -g allow-rename off

# Faster command sequences
set -s escape-time 0

# Status bar styling
set -g status-style bg=black,fg=white
set -g status-left-length 20
set -g status-right '%Y-%m-%d %H:%M'

# Pane borders: subtly highlight the active pane (no background overrides,
# so your terminal theme stays intact)
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour109

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect: capture pane contents and restore vim/neovim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save and auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'

