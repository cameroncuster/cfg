# single line prompt
format = """$username$hostname$directory$git_branch$git_status$kubernetes$cmd_duration$character"""

add_newline = false

[directory]
truncation_length = 3

[git_branch]
format = "[$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
detect_folders = []

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
